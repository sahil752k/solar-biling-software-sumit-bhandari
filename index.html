<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>R.S. Bhandari Solar | Invoice System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            /* background: #f0f4f8; */
            background:grey;
            padding: 20px 16px;
        }

        /* ENTRY PANEL — FULLY RESPONSIVE */
        .entry-panel {
            max-width: 1280px;
            margin: 0 auto 32px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12);
            padding: 24px 20px;
            transition: all 0.2s ease;
        }

        h2 {
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 700;
            color: #0f172a;
            border-left: 5px solid #f97316;
            padding-left: 16px;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
        }

  h3{
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 400;
            color: #0f172a;
            border-left: 5px solid #101b67;
            padding-left: 16px;
            margin-bottom: 2px;
            letter-spacing: -0.3px;
        }



        /* responsive flex grid */
        .responsive-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 28px;
        }

        .form-card {
            flex: 1 1 260px;
            background:linear-gradient(135deg, #EEF2FF, #d4dbe2);
            border-radius: 24px;
            padding: 16px 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            transition: 0.2s;
        }

        .form-card label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #334155;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: inherit;
            background: white;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #f97316;
            outline: none;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
        }

        /* item blocks - responsive layout */
        .items-wrapper {
            margin: 16px 0 12px;
        }

        .item-block {
                        background:linear-gradient(135deg, #EEF2FF, #d4dbe2);

            /* background: #ffffff; */
            border: 1px solid #eef2f6;
            border-radius: 28px;
            padding: 20px 18px;
            margin-bottom: 18px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: 0.1s;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .item-grid > div label {
            font-size: 10px;
            font-weight: 800;
            color: #475569;
            display: block;
            margin-bottom: 6px;
        }

        .btn-remove-item {
            position: absolute;
            top: 12px;
            right: 16px;
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-remove-item:hover {
            background: #fecaca;
            transform: scale(1.02);
        }

        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 44px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 8px 0 20px;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-generate {
            background: #f97316;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 44px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        .btn-add:active, .btn-generate:active {
            transform: scale(0.98);
        }

        /* INVOICE PREVIEW RESPONSIVE */
        .invoice-preview-area {
            display: none;
            background: #e9eef3;
            min-height: 100vh;
            padding: 20px 12px 40px;
            flex-direction: column;
            align-items: center;
        }

        .action-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
            width: 100%;
            max-width: 700px;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 60px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            background: white;
            color: #1e293b;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            transition: 0.2s;
            font-size: 0.9rem;
            flex: 0 0 auto;
        }

        .action-btn.pdf {
            background: #dc2626;
            color: white;
        }

        .action-btn.whatsapp {
            background: #25D366;
            color: white;
        }

        .action-btn.print {
            background: #3b82f6;
            color: white;
        }

        /* INVOICE CARD RESPONSIVE SCALING */
        .invoice-single-container {
            background: white;
            width: 100%;
            max-width: 210mm;
            margin: 0 auto;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
            border-radius: 0;
            border: 1px solid #d4dce6;
        }

        .invoice-content {
            padding: 8mm 12mm;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        /* responsive company header */
        .company-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .brand h1 {
            font-size: clamp(18px, 5vw, 26px);
            font-weight: 800;
            color: #000;
            font-family: 'Times New Roman', serif;
            line-height: 1.2;
        }

        .gst-line {
            font-size: 10px;
            line-height: 1.4;
            color: #2c3e44;
        }

        /* .tax-badge {
            font-size: clamp(12px, 4vw, 16px);
            font-weight: bold;
            border: 2px solid #000;
            padding:0px;
            white-space: nowrap;
        }  */


/* @media print {
    .tax-badge {
        font-size: 9px !important;
        padding: 2px 6px !important;
        border-width:none !important;
    }
}
@media (max-width: 680px) {
    .tax-badge {
        font-size: 10px !important;
        padding:0px !important;
    }
} */

        .invoice-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            border-top: 1px solid #aaa;
            border-bottom: 1px solid #aaa;
            padding: 8px 0;
            margin-bottom: 16px;
            font-size: 12px;
            font-weight: 500;
            gap: 12px;
        }

        .address-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid #aaa;
            margin-bottom: 20px;
        }

        .address-col {
            padding: 12px 10px;
            font-size: 11px;
            line-height: 1.5;
            word-break: break-word;
        }

        .address-col:first-child {
            border-right: 1px solid #aaa;
        }

        .addr-title {
            font-weight: 800;
            text-decoration: underline;
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-bottom: 14px;
        }

        .items-table th,
        .items-table td {
            border: 1px solid #aaa;
            padding: 8px 4px;
            vertical-align: top;
        }

        .items-table th {
            background: #f1f5f9;
            font-weight: 800;
            font-size: 11px;
        }

        .subtotal-row td {
            font-weight: bold;
            background: #fef9e6;
            border-top: 2px solid #000;
        }

        .bottom-split {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 12px;
        }

        .terms-style {
            flex: 1.2;
            min-width: 180px;
            font-size: 10px;
            line-height: 1.4;
        }

        .amount-panel {
            flex: 1;
            background: #fffaf0;
            padding: 12px;
            border-radius: 14px;
            font-size: 11px;
        }

        .calc-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            flex-wrap: wrap;
        }

        .total-strong {
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
            font-weight: 800;
            font-size: 14px;
            padding: 8px 0;
            margin: 8px 0;
        }

        .words-block {
            border: 1px solid #d4d4d4;
            background: #fffdf7;
            padding: 8px;
            font-size: 10px;
            margin-top: 12px;
        }

        .signature-footer {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
        }

        .sign-box {
            text-align: center;
            width: 180px;
        }

        .signature-image {
            max-width: 140px;
            max-height: 70px;
            margin-bottom: 6px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            object-fit: contain;
        }

        @media (max-width: 680px) {
            .entry-panel {
                padding: 18px 14px;
            }
            .item-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .item-block {
                padding: 16px 12px;
            }
            .address-grid {
                grid-template-columns: 1fr;
            }
            .address-col:first-child {
                border-right: none;
                border-bottom: 1px solid #aaa;
            }
            .invoice-content {
                padding: 6mm 8mm;
            }
            .items-table th, .items-table td {
                padding: 5px 3px;
                font-size: 9px;
            }
            .brand h1 {
                font-size: 18px;
            }
            .tax-badge {
                font-size: 11px;
            }
        }

        /* Print Styles - Optimized for PDF */
        @media print {
            body {
                background: white;
                margin: 0;
                padding: 0;
            }
            .entry-panel, .action-toolbar {
                display: none !important;
            }
            .invoice-preview-area {
                display: block !important;
                background: white;
                padding: 0;
                margin: 0;
            }
            .invoice-single-container {
                box-shadow: none;
                border: none;
                margin: 0;
                width: 100%;
                max-width: 100%;
            }
            .invoice-content {
                padding: 10mm;
            }
        }

        .warning-note {
            background: #fff3e0;
            padding: 8px;
            border-radius: 16px;
            font-size: 11px;
            text-align: center;
            margin-top: 10px;
        }

        .success-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div id="successMessage" class="success-message"></div>

<div id="entryPanel" class="entry-panel">
    <h2>☀️ R.S. Bhandari Solar · Smart Invoice</h2>
    
    <div class="responsive-grid">
        <div class="form-card">

        <div class="form-card">
            <label>🧑‍💼 Customer Name</label>

            <label>🏠 Address</label>

        </div>
        <div class="form-card">
            <label>💰 Amount Received (₹)</label>
            <input type="number" id="receivedAmt" value="" step="any" placeholder="0.00">

        </div>
    </div>
<h3>Add Product Details.</h3>
    <div id="itemsDynamicList" class="items-wrapper">
        <div class="item-block">
            <button class="btn-remove-item" onclick="this.closest('.item-block').remove()">✕</button>
            <div class="item-grid">
                <div><label>🔧 Description</label><input type="text" class="itemDesc" value=""></div>
                <div><label>📦 Qty</label><input type="text" class="itemQty" value=""></div>
                <div><label>💰 Rate (₹)</label><input type="number" step="any" class="itemRate" value=""></div>
                <div><label>📊 Tax %</label><input type="number" step="any" class="itemTax" value=""></div>
            </div>
        </div>
        <div class="item-block">
            <button class="btn-remove-item" onclick="this.closest('.item-block').remove()">✕</button>
            <div class="item-grid">
                <div><label>🔧 Description</label><input type="text" class="itemDesc" value=""></div>
                <div><label>📦 Qty</label><input type="text" class="itemQty" value=""></div>
                <div><label>💰 Rate (₹)</label><input type="number" step="any" class="itemRate" value=""></div>
                <div><label>📊 Tax %</label><input type="number" step="any" class="itemTax" value=""></div>
            </div>
        </div>
    </div>
    <button class="btn-add" onclick="addNewProduct()">+ Add More Items</button>
    <button class="btn-generate" onclick="generateCompleteInvoice()">✨ Generate Bill & Preview</button>
    <!-- <div class="warning-note">💡 Responsive design — Use "Save as PDF" from print dialog (Ctrl+P / Cmd+P)</div> -->
</div>

<div id="invoicePreviewArea" class="invoice-preview-area">
    <div class="action-toolbar">
        <button class="action-btn" onclick="backToEdit()">✏️ Edit Bill</button>
        <button class="action-btn print" onclick="printInvoice()">📑 Save as PDF / Print</button>
        <button class="action-btn whatsapp" id="whatsappBtn" onclick="shareWhatsApp()">💬 WhatsApp Share</button>
    </div>
    <div id="invoiceContainer" style="background: white; width: 100%; max-width: 210mm; margin: 0 auto;"></div>
</div>

<script>
    // ============================================================
    // PERMANENT SIGNATURE IMAGE (modify path as needed)
    // ============================================================
    const PERMANENT_SIGNATURE_IMAGE_PATH = "./rs final sign.png";  // ← change to actual path or keep empty
    // ============================================================

    function showMessage(msg, isError = false) {
        const msgDiv = document.getElementById('successMessage');
        msgDiv.textContent = msg;
        msgDiv.style.backgroundColor = isError ? '#ef4444' : '#10b981';
        msgDiv.style.display = 'block';
        setTimeout(() => {
            msgDiv.style.display = 'none';
        }, 3000);
    }

    // Number to words (robust)
    function convertNumberToWords(amount) {
        if (isNaN(amount) || amount <= 0) return "Zero Rupees Only";
        const num = Math.floor(amount);
        const a = ['','One ','Two ','Three ','Four ','Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        const b = ['', '', 'Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
        if (num === 0) return "Zero Rupees Only";
        const strNum = ('000000000' + num).slice(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!strNum) return amount.toString();
        let words = '';
        words += (strNum[1] != 0) ? (a[Number(strNum[1])] || b[strNum[1][0]] + ' ' + a[strNum[1][1]]) + 'Crore ' : '';
        words += (strNum[2] != 0) ? (a[Number(strNum[2])] || b[strNum[2][0]] + ' ' + a[strNum[2][1]]) + 'Lakh ' : '';
        words += (strNum[3] != 0) ? (a[Number(strNum[3])] || b[strNum[3][0]] + ' ' + a[strNum[3][1]]) + 'Thousand ' : '';
        words += (strNum[4] != 0) ? (a[Number(strNum[4])] || b[strNum[4][0]] + ' ' + a[strNum[4][1]]) + 'Hundred ' : '';
        words += (strNum[5] != 0) ? ((words !== '') ? 'and ' : '') + (a[Number(strNum[5])] || b[strNum[5][0]] + ' ' + a[strNum[5][1]]) : '';
        words += 'Rupees Only';
        return words.trim().replace(/\s+/, ' ');
    }

    function addNewProduct() {
        const container = document.getElementById('itemsDynamicList');
        const newBlock = document.createElement('div');
        newBlock.className = 'item-block';
        newBlock.innerHTML = `
            <button class="btn-remove-item" onclick="this.closest('.item-block').remove()">✕</button>
            <div class="item-grid">
                <div><label>🔧 Description</label><input type="text" class="itemDesc" placeholder="Product / Service"></div>
                <div><label>📦 Qty</label><input type="text" class="itemQty" value="1"></div>
                <div><label>💰 Rate (₹)</label><input type="number" step="any" class="itemRate" value="0"></div>
                <div><label>📊 Tax %</label><input type="number" step="any" class="itemTax" value="5"></div>
            </div>
        `;
        container.appendChild(newBlock);
    }

    function fetchItemRows() {
        const descs = document.querySelectorAll('.itemDesc');
        const qtys = document.querySelectorAll('.itemQty');
        const rates = document.querySelectorAll('.itemRate');
        const taxVals = document.querySelectorAll('.itemTax');
        let items = [];
        for (let i = 0; i < descs.length; i++) {
            let qtyNum = parseFloat(qtys[i].value);
            if (isNaN(qtyNum)) qtyNum = 0;
            let rateVal = parseFloat(rates[i].value) || 0;
            let taxPercent = parseFloat(taxVals[i].value) || 0;
            let taxable = qtyNum * rateVal;
            let taxAmount = taxable * (taxPercent / 100);
            let total = taxable + taxAmount;
            items.push({
                desc: descs[i].value || "Item",
                qtyDisplay: qtys[i].value,
                qtyNum: qtyNum,
                rate: rateVal,
                taxPercent: taxPercent,
                taxable: taxable,
                taxAmount: taxAmount,
                total: total
            });
        }
        return items;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function createCompleteInvoice() {
        const invNo = document.getElementById('invNumber').value.trim() || "INV-001";
        const invDate = document.getElementById('invDate').value.trim() || new Date().toLocaleDateString();
        const custNameRaw = document.getElementById('custName').value.trim() || "Customer";
        const custAddrFull = document.getElementById('custAddr').value.trim() || "Address not provided";
        const custMobileRaw = document.getElementById('custMobile').value.trim();
        const receivedAmount = parseFloat(document.getElementById('receivedAmt').value) || 0;

        const allItems = fetchItemRows();
        if (allItems.length === 0) {
            alert("⚠️ Please add at least one item/product.");
            return null;
        }

        let globalTaxable = 0, globalTax = 0, globalGrand = 0, globalTotalQty = 0;
        allItems.forEach(it => {
            globalTaxable += it.taxable;
            globalTax += it.taxAmount;
            globalGrand += it.total;
            globalTotalQty += it.qtyNum;
        });

        // GST breakdown by slab
        let taxSlabMap = new Map();
        allItems.forEach(it => {
            let pct = it.taxPercent;
            let existing = taxSlabMap.get(pct) || 0;
            taxSlabMap.set(pct, existing + it.taxAmount);
        });

        let itemsRowsHtml = '';
        allItems.forEach((it, idx) => {
            itemsRowsHtml += `
                <tr>
                    <td align="center">${idx+1}</td>
                    <td><b>${escapeHtml(it.desc)}</b></td>
                    <td align="center">${escapeHtml(it.qtyDisplay)}</td>
                    <td align="right">${it.rate.toLocaleString('en-IN', {minimumFractionDigits:2})}</td>
                    <td align="right">${it.taxAmount.toFixed(2)} (${it.taxPercent}%)</td>
                    <td align="right">${it.total.toLocaleString('en-IN', {minimumFractionDigits:2})}</td>
                </tr>
            `;
        });

        let gstBreakdownHtml = '';
        for (let [taxPercent, totalTaxAmt] of taxSlabMap.entries()) {
            let halfRate = taxPercent / 2;
            let halfTax = totalTaxAmt / 2;
            gstBreakdownHtml += `
                <div class="calc-row"><span>CGST @ ${halfRate.toFixed(2)}%</span><span>₹ ${halfTax.toFixed(2)}</span></div>
                <div class="calc-row"><span>SGST @ ${halfRate.toFixed(2)}%</span><span>₹ ${halfTax.toFixed(2)}</span></div>
            `;
        }
        if (gstBreakdownHtml === "") gstBreakdownHtml = '<div class="calc-row"><span>No Tax</span><span>₹ 0.00</span></div>';

        let signatureHtml = '';
        if (PERMANENT_SIGNATURE_IMAGE_PATH && PERMANENT_SIGNATURE_IMAGE_PATH !== '') {
            signatureHtml = `
                <img src="${PERMANENT_SIGNATURE_IMAGE_PATH}" class="signature-image" alt="Authorized Signature" 
                    onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='<div style=\\'width:100px;height:60px;border:1px dashed #9ca3af;border-radius:12px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#6b7280;\\'>Stamp</div><div>Authorized Signatory</div><div style=\\'font-size:10px;color:#555;margin-top:5px;\\'>R.S. Bhandari Solar</div>';">
                <div>Authorized Signatory</div>
                <div style="font-size: 9px; color: #4b5563;">R.S. Bhandari Solar Energy</div>
            `;
        } else {
            signatureHtml = `
                <div style="width: 100px; height: 60px; border: 1px dashed #9ca3af; border-radius: 12px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #6b7280;">Stamp</div>
                <div>Authorized Signatory</div>
                <div style="font-size: 9px; color: #4b5563;">R.S. Bhandari Solar</div>
            `;
        }

        const invoiceHtml = `
            <div class="invoice-content">
                <div class="company-header">
                    <div class="brand">
                        <h1>R.S. Bhandari Solar Energy Solutions</h1>

    function generateCompleteInvoice() {
        const invoiceHtml = createCompleteInvoice();
        if (!invoiceHtml) return;
        const container = document.getElementById('invoiceContainer');
        container.innerHTML = invoiceHtml;
        document.getElementById('entryPanel').style.display = 'none';
        document.getElementById('invoicePreviewArea').style.display = 'flex';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        showMessage("✅ Invoice generated successfully!", false);
    }

    function backToEdit() {
        document.getElementById('entryPanel').style.display = 'block';
        document.getElementById('invoicePreviewArea').style.display = 'none';
    }
